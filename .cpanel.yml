---
deployment:
  tasks:
    # O cPanel executa este script dentro da conta, então $HOME aponta para /home/SEU_USUARIO.
    # Para publicar em subdiretório, use: $HOME/public_html/wireframe
    - export DEPLOYPATH=$HOME/public_html
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp index.html $DEPLOYPATH/index.html
